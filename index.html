<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GPS PRO Geofencing</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:750px;
}

.card{
    background:#1e293b;
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    margin-bottom:25px;
    font-size:42px;
}

.logo{
    width:260px;
    border-radius:20px;
    margin-top:25px;

    opacity:0;
    transform:scale(0.9);

    transition:0.6s;
}

.logo.show{
    opacity:1;
    transform:scale(1);
}

.message{
    margin-top:25px;
    font-size:34px;
}

.coords{
    margin-top:25px;
    opacity:0.8;
    line-height:1.8;
    font-size:15px;
}

.debug{
    margin-top:25px;
    background:#0f172a;
    border-radius:15px;
    padding:20px;
    text-align:left;
    font-size:14px;
    line-height:1.7;
    max-height:300px;
    overflow:auto;
}

hr{
    margin:12px 0;
    border-color:rgba(255,255,255,0.08);
}

.status{
    margin-top:15px;
    color:#22c55e;
    font-size:18px;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>GPS PRO</h1>

        <div id="result">

            <div class="message">
                Łączenie z GPS...
            </div>

        </div>

        <div id="coords" class="coords"></div>

        <div id="status" class="status"></div>

        <div id="debug" class="debug"></div>

    </div>

</div>

<script>

// =====================================
// STREFY
// =====================================

const zones = [

    {
        name: "Pralnia",
        lat: 50.6309799,
        lon: 18.8256773,
        radius: 10,
        img: "1.jpg"
    },

    {
        name: "Helenka",
        lat: 50.6310118,
        lon: 18.8256646,
        radius: 10,
        img: "2.jpg"
    }

];


// =====================================
// USTAWIENIA PRO
// =====================================

// ile metrów bliżej musi być nowa strefa
// żeby przełączyć

const SWITCH_ADVANTAGE = 4;

// ile kolejnych odczytów potrzeba
// do zmiany strefy

const REQUIRED_CONFIRMATIONS = 3;


// =====================================
// ZMIENNE
// =====================================

let currentZone = null;

let pendingZone = null;

let pendingCount = 0;


// =====================================
// START GPS
// =====================================

window.onload = () => {

    if(!navigator.geolocation){

        alert("GPS nie jest wspierany");

        return;

    }

    navigator.geolocation.watchPosition(

        success,
        error,

        {
            enableHighAccuracy:true,
            maximumAge:0,
            timeout:5000
        }

    );

};


// =====================================
// SUCCESS
// =====================================

function success(position){

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const acc = position.coords.accuracy;

    // =====================================
    // DEBUG GPS
    // =====================================

    document.getElementById("coords").innerHTML = `

        LAT: ${lat}<br>
        LON: ${lon}<br>
        Accuracy: ${Math.round(acc)}m

    `;

    // =====================================
    // SŁABY GPS
    // =====================================

    if(acc > 35){

        document.getElementById("status").innerHTML =
            "Słaby sygnał GPS";

        return;

    }

    // =====================================
    // SZUKANIE NAJBLIŻSZEJ STREFY
    // =====================================

    let closestZone = null;

    let closestDistance = Infinity;

    let debugHTML = "";

    for(let zone of zones){

        const distance = getDistance(

            lat,
            lon,

            zone.lat,
            zone.lon

        );

        debugHTML += `

            <b>${zone.name}</b><br>

            Distance:
            ${distance.toFixed(2)}m<br>

            Radius:
            ${zone.radius}m

            <hr>

        `;

        // tylko strefy w zasięgu

        if(distance <= zone.radius){

            if(distance < closestDistance){

                closestDistance = distance;

                closestZone = zone;

            }

        }

    }

    document.getElementById("debug").innerHTML =
        debugHTML;

    // =====================================
    // BRAK STREFY
    // =====================================

    if(!closestZone){

        pendingZone = null;
        pendingCount = 0;

        currentZone = null;

        showOutside();

        return;

    }

    // =====================================
    // PIERWSZA STREFA
    // =====================================

    if(currentZone === null){

        currentZone = closestZone;

        renderZone(currentZone);

        return;

    }

    // =====================================
    // TA SAMA STREFA
    // =====================================

    if(currentZone.name === closestZone.name){

        pendingZone = null;
        pendingCount = 0;

        renderZone(currentZone);

        return;

    }

    // =====================================
    // STICKY ZONE
    // =====================================

    const currentDistance = getDistance(

        lat,
        lon,

        currentZone.lat,
        currentZone.lon

    );

    // nowa strefa musi być wyraźnie bliżej

    if(
        currentDistance - closestDistance
        < SWITCH_ADVANTAGE
    ){

        renderZone(currentZone);

        document.getElementById("status").innerHTML =

            "Sticky zone aktywne";

        return;

    }

    // =====================================
    // CONFIRM SWITCH
    // =====================================

    if(
        pendingZone &&
        pendingZone.name === closestZone.name
    ){

        pendingCount++;

    }

    else{

        pendingZone = closestZone;

        pendingCount = 1;

    }

    document.getElementById("status").innerHTML = `

        Zmiana strefy...
        (${pendingCount}/${REQUIRED_CONFIRMATIONS})

    `;

    // =====================================
    // SWITCH
    // =====================================

    if(
        pendingCount >= REQUIRED_CONFIRMATIONS
    ){

        currentZone = closestZone;

        pendingZone = null;

        pendingCount = 0;

        renderZone(currentZone);

    }

}


// =====================================
// RENDER STREFY
// =====================================

function renderZone(zone){

    document.getElementById("status").innerHTML =
        "Strefa aktywna";

    document.getElementById("result").innerHTML = `

        <img
            class="logo show"
            src="${zone.img}"
        >

        <div class="message">
            ${zone.name}
        </div>

    `;

}


// =====================================
// POZA STREFĄ
// =====================================

function showOutside(){

    document.getElementById("status").innerHTML =
        "Brak aktywnej strefy";

    document.getElementById("result").innerHTML = `

        <div class="message">
            Poza strefą
        </div>

    `;

}


// =====================================
// DISTANCE
// =====================================

function getDistance(lat1, lon1, lat2, lon2){

    const R = 6371000;

    const dLat =
        (lat2-lat1) * Math.PI/180;

    const dLon =
        (lon2-lon1) * Math.PI/180;

    const a =

        Math.sin(dLat/2) *
        Math.sin(dLat/2)

        +

        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180)

        *

        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    const c = 2 * Math.atan2(

        Math.sqrt(a),
        Math.sqrt(1-a)

    );

    return R * c;

}


// =====================================
// ERROR
// =====================================

function error(err){

    console.log(err);

    document.getElementById("result").innerHTML = `

        <div class="message">
            GPS Error
        </div>

    `;

}

</script>

</body>
</html>
